services:
  - type: web
    name: postara-api
    runtime: node
    rootDir: postara-backend
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_PRIMARY_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_BACKUP_MODEL
        value: gemini-2.5-flash-lite
      - key: CORS_ORIGIN
        sync: false
      - key: AI_FALLBACK_MODE
        value: template
      - key: HISTORY_DB_PATH
        value: /opt/render/project/src/data/postara.sqlite
      - key: AUTH_SESSION_TTL_DAYS
        value: 30
      - key: ENABLE_DEV_SUBSCRIPTION_MANAGEMENT
        value: true
    disk:
      name: postara-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5

